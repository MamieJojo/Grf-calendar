<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Calendrier Juillet 2026</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Juillet 2026">
<meta name="theme-color" content="#F8F7F4">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #F8F7F4;
    color: #1a1a1a;
    padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    -webkit-user-select: none;
    user-select: none;
  }
  .month-title {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin: 16px 0;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-header {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: #888880;
    padding: 4px 0;
    text-transform: uppercase;
  }
  .cal-day {
    background: #FFFFFF;
    border: 0.5px solid #CFCDC6;
    border-radius: 8px;
    padding: 5px;
    min-height: 84px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    transition: background 0.15s;
  }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-day.greyed { background: #B5B3AE; border-color: #7A7975; }
  .cal-day.greyed .day-num { color: #555555; }
  .day-num { font-size: 12px; font-weight: 700; }
  .field-row { display: flex; align-items: center; gap: 3px; margin-top: auto; }
  .field-row label { font-size: 12px; width: 14px; text-align: center; flex-shrink: 0; }
  .field-row input[type=number] {
    width: 100%;
    min-width: 0;
    height: 24px;
    font-size: 11px;
    padding: 0 4px;
    border: 0.5px solid #C8C6BE;
    border-radius: 4px;
    background: #F8F7F4;
    color: #1a1a1a;
  }
  .field-row input[type=color] {
    width: 26px;
    height: 24px;
    padding: 1px;
    border: 0.5px solid #C8C6BE;
    border-radius: 4px;
    background: #F8F7F4;
  }
  input:disabled { opacity: 0.4; }
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 18px 0 24px;
  }
  .metric {
    background: #FFFFFF;
    border: 0.5px solid #CFCDC6;
    border-radius: 10px;
    padding: 12px;
  }
  .metric-label { font-size: 11px; color: #888880; margin: 0 0 4px; }
  .metric-value { font-size: 22px; font-weight: 700; margin: 0; }
</style>
</head>
<body>

<div class="month-title">Juillet 2026</div>
<div class="cal-grid" id="cal"></div>

<div class="summary">
  <div class="metric">
    <p class="metric-label">Total personnes</p>
    <p class="metric-value" id="total-people">0</p>
  </div>
  <div class="metric">
    <p class="metric-label">Jours renseignés</p>
    <p class="metric-value" id="days-filled">0</p>
  </div>
</div>

<script>
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const cal = document.getElementById('cal');
const offset = 2; // 1 juillet 2026 = mercredi

function getCol(day) { return (day - 1 + offset) % 7; }

function isGreyed(day) {
  if (day === 2) return true;
  const col = getCol(day);
  if (day >= 7 && (col === 1 || col === 2)) return true;
  return false;
}

DAYS_FR.forEach(d => {
  const h = document.createElement('div');
  h.className = 'cal-header';
  h.textContent = d;
  cal.appendChild(h);
});

for (let i = 0; i < offset; i++) {
  const e = document.createElement('div');
  e.className = 'cal-day empty';
  cal.appendChild(e);
}

const STORAGE_KEY = 'calendrier-juillet-2026';
let state = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch (e) {}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function updateSummary() {
  let total = 0, filled = 0;
  Object.values(state).forEach(v => {
    const n = parseInt(v.people, 10);
    if (!isNaN(n) && n > 0) { total += n; filled += 1; }
  });
  document.getElementById('total-people').textContent = total;
  document.getElementById('days-filled').textContent = filled;
}

for (let d = 1; d <= 31; d++) {
  if (!state[d]) state[d] = { people: '', color: '#e2e2e2' };
  const greyed = isGreyed(d);

  const cell = document.createElement('div');
  cell.className = 'cal-day' + (greyed ? ' greyed' : '');
  if (!greyed && state[d].color && state[d].color !== '#e2e2e2') {
    cell.style.background = state[d].color;
  }

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = d;
  cell.appendChild(num);

  const fp = document.createElement('div');
  fp.className = 'field-row';
  const pl = document.createElement('label');
  pl.textContent = '#';
  const pi = document.createElement('input');
  pi.type = 'number';
  pi.min = '0';
  pi.placeholder = '0';
  pi.value = state[d].people || '';
  pi.inputMode = 'numeric';
  if (greyed) pi.disabled = true;
  pi.addEventListener('input', () => {
    state[d].people = pi.value;
    saveState();
    updateSummary();
  });
  fp.appendChild(pl);
  fp.appendChild(pi);
  cell.appendChild(fp);

  const fc = document.createElement('div');
  fc.className = 'field-row';
  const cl = document.createElement('label');
  cl.textContent = '🎨';
  const ci = document.createElement('input');
  ci.type = 'color';
  ci.value = state[d].color || '#e2e2e2';
  if (greyed) ci.disabled = true;
  ci.addEventListener('input', () => {
    state[d].color = ci.value;
    cell.style.background = ci.value;
    saveState();
  });
  fc.appendChild(cl);
  fc.appendChild(ci);
  cell.appendChild(fc);

  cal.appendChild(cell);
}

updateSummary();
</script>
</body>
</html>
