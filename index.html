<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendrier Juillet 2026</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E24B4A'/%3E%3Ctext x='50' y='62' font-size='40' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'%3E31%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E24B4A'/%3E%3Ctext x='50' y='62' font-size='40' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'%3E31%3C/text%3E%3C/svg%3E">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #F4F3EF;
    color: #1a1a1a;
    padding-bottom: 2rem;
  }
  .topbar {
    background: #ffffff;
    padding: 1rem 1rem 0.75rem;
    border-bottom: 1px solid #E4E2DC;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 8px;
    text-align: center;
  }
  .name-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .name-row label {
    font-size: 12px;
    color: #888880;
    font-weight: 600;
    white-space: nowrap;
  }
  .name-row input {
    flex: 1;
    height: 32px;
    font-size: 14px;
    padding: 0 8px;
    border: 1px solid #D5D3CC;
    border-radius: 6px;
    background: #FAFAF8;
  }
  .cal-wrap { padding: 1rem 0.6rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .cal-header { text-align: center; font-size: 13px; font-weight: 600; color: #888880; padding: 4px 0 10px; }
  .cal-day {
    background: #ffffff;
    border: 1px solid #E4E2DC;
    border-radius: 12px;
    padding: 10px 8px;
    min-height: 175px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-day.greyed { background: #ECEAE5; opacity: 0.6; }
  .day-num { font-size: 18px; font-weight: 700; }
  .field-row { display: flex; align-items: center; gap: 5px; margin-top: auto; }
  .field-row input[type=number] {
    width: 100%;
    min-width: 0;
    height: 38px;
    font-size: 16px;
    padding: 0 8px;
    border: 1.5px solid #D5D3CC;
    border-radius: 7px;
    background: #FAFAF8;
    -moz-appearance: textfield;
  }
  .field-row input[type=number]::-webkit-outer-spin-button,
  .field-row input[type=number]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .field-row input:disabled { opacity: 0.4; }
  .place-row { margin-top: 0; }
  .place-row input[type=text] {
    width: 100%;
    height: 34px;
    font-size: 14px;
    padding: 0 8px;
    border: 1.5px solid #D5D3CC;
    border-radius: 7px;
    background: #FAFAF8;
  }
  .place-row input:disabled { opacity: 0.4; }
  .icon { font-size: 16px; width: 20px; text-align: center; color: #999990; flex-shrink: 0; }
  .color-choices { display: flex; gap: 5px; flex: 1; }
  .color-swatch {
    flex: 1;
    height: 38px;
    border-radius: 7px;
    border: 1.5px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #000;
    padding: 0;
  }
  .color-swatch.selected { border-color: #1a1a1a; }
  .color-swatch:disabled { cursor: not-allowed; opacity: 0.5; }
  .color-swatch.c-vert { background: #4CAF50; }
  .color-swatch.c-jaune { background: #FFD54F; }
  .color-swatch.c-rouge { background: #E24B4A; }
  .color-swatch.c-rougeE { background: #E24B4A; font-size: 15px; }
  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1.25rem 0.6rem 0; }
  .metric { background: #ffffff; border: 1px solid #E4E2DC; border-radius: 12px; padding: 1rem; }
  .metric-label { font-size: 13px; color: #888880; margin: 0 0 4px; }
  .metric-value { font-size: 24px; font-weight: 600; margin: 0; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Juillet 2026</h1>
  <div class="name-row">
    <label for="user-name">Groupe</label>
    <input type="text" id="user-name" placeholder="Votre groupe">
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-grid" id="cal"></div>
</div>

<div class="summary">
  <div class="metric">
    <p class="metric-label">Total personnes</p>
    <p class="metric-value" id="total-people">0</p>
  </div>
  <div class="metric">
    <p class="metric-label">Jours renseignés</p>
    <p class="metric-value" id="days-filled">0</p>
  </div>
</div>

<script>
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const cal = document.getElementById('cal');
const offset = 2; // 1 juillet 2026 = mercredi

function getCol(day) { return (day - 1 + offset) % 7; }

function isGreyed(day) {
  if (day === 2) return true;
  const col = getCol(day);
  if (day >= 7 && (col === 1 || col === 2)) return true;
  return false;
}

DAYS_FR.forEach(d => {
  const h = document.createElement('div');
  h.className = 'cal-header';
  h.textContent = d;
  cal.appendChild(h);
});

for (let i = 0; i < offset; i++) {
  const e = document.createElement('div');
  e.className = 'cal-day empty';
  cal.appendChild(e);
}

const STORAGE_KEY = 'calendrier-juillet-2026';
const NAME_KEY = 'calendrier-juillet-2026-name';
let state = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch (e) {}

const nameInput = document.getElementById('user-name');
try {
  const savedName = localStorage.getItem(NAME_KEY);
  if (savedName) nameInput.value = savedName;
} catch (e) {}
nameInput.addEventListener('input', () => {
  try { localStorage.setItem(NAME_KEY, nameInput.value); } catch (e) {}
});

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function updateSummary() {
  let total = 0;
  let filled = 0;
  Object.values(state).forEach(v => {
    const n = parseInt(v.people, 10);
    if (!isNaN(n) && n > 0) { total += n; filled += 1; }
  });
  document.getElementById('total-people').textContent = total;
  document.getElementById('days-filled').textContent = filled;
}

for (let d = 1; d <= 31; d++) {
  if (!state[d]) state[d] = { people: '', color: '', place: '' };
  const greyed = isGreyed(d);

  const cell = document.createElement('div');
  cell.className = 'cal-day' + (greyed ? ' greyed' : '');
  if (state[d].color) cell.style.background = state[d].color;

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = d;
  cell.appendChild(num);

  const fl = document.createElement('div');
  fl.className = 'field-row place-row';
  const li = document.createElement('input');
  li.type = 'text';
  li.placeholder = 'Lieu';
  li.value = state[d].place || '';
  if (greyed) li.disabled = true;
  li.addEventListener('input', () => {
    state[d].place = li.value;
    save();
  });
  fl.appendChild(li);
  cell.appendChild(fl);

  const fp = document.createElement('div');
  fp.className = 'field-row';
  const pIcon = document.createElement('span');
  pIcon.className = 'icon';
  pIcon.textContent = '👤';
  const pi = document.createElement('input');
  pi.type = 'number';
  pi.min = '0';
  pi.placeholder = '0';
  pi.value = state[d].people || '';
  pi.inputMode = 'numeric';
  if (greyed) pi.disabled = true;
  pi.addEventListener('input', () => {
    state[d].people = pi.value;
    save();
    updateSummary();
  });
  fp.appendChild(pIcon);
  fp.appendChild(pi);
  cell.appendChild(fp);

  const fc = document.createElement('div');
  fc.className = 'field-row';
  const colorChoices = document.createElement('div');
  colorChoices.className = 'color-choices';

  const options = [
    { key: 'vert', label: '', cls: 'c-vert', color: '#4CAF50' },
    { key: 'jaune', label: '', cls: 'c-jaune', color: '#FFD54F' },
    { key: 'rouge', label: '', cls: 'c-rouge', color: '#E24B4A' },
    { key: 'rougeE', label: 'E', cls: 'c-rougeE', color: '#8B1E1E' }
  ];

  const swatchEls = [];
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'color-swatch ' + opt.cls;
    btn.textContent = opt.label;
    btn.setAttribute('aria-label', opt.key);
    if (greyed) btn.disabled = true;
    if (state[d].colorKey === opt.key) {
      btn.classList.add('selected');
      cell.style.background = opt.color;
    }
    btn.addEventListener('click', () => {
      if (state[d].colorKey === opt.key) {
        // Deselect
        state[d].colorKey = null;
        state[d].color = '';
        swatchEls.forEach(el => el.classList.remove('selected'));
        cell.style.background = '';
      } else {
        state[d].colorKey = opt.key;
        state[d].color = opt.color;
        swatchEls.forEach(el => el.classList.remove('selected'));
        btn.classList.add('selected');
        cell.style.background = opt.color;
      }
      save();
    });
    swatchEls.push(btn);
    colorChoices.appendChild(btn);
  });

  fc.appendChild(colorChoices);
  cell.appendChild(fc);

  cal.appendChild(cell);
}

updateSummary();
</script>

</body>
</html>
