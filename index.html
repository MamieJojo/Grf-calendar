<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendrier Juillet 2026</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E24B4A'/%3E%3Ctext x='50' y='62' font-size='40' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'%3E31%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E24B4A'/%3E%3Ctext x='50' y='62' font-size='40' fill='white' text-anchor='middle' font-family='Arial' font-weight='bold'%3E31%3C/text%3E%3C/svg%3E">

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #F4F3EF;
    color: #1a1a1a;
    padding-bottom: 2rem;
  }
  .topbar {
    background: #ffffff;
    padding: 1rem 1rem 0.75rem;
    border-bottom: 1px solid #E4E2DC;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 0 0 8px;
    text-align: center;
  }
  .name-row { display: flex; align-items: center; gap: 6px; }
  .name-row label { font-size: 12px; color: #888880; font-weight: 600; white-space: nowrap; }
  .name-row input {
    flex: 1; height: 32px; font-size: 14px; padding: 0 8px;
    border: 1px solid #D5D3CC; border-radius: 6px; background: #FAFAF8;
  }

  .cal-wrap { padding: 1rem 0.6rem; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .cal-header { text-align: center; font-size: 13px; font-weight: 600; color: #888880; padding: 4px 0 10px; }

  .cal-day {
    background: #ffffff;
    border: 1px solid #E4E2DC;
    border-radius: 12px;
    min-height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.greyed { background: #ECEAE5; opacity: 0.6; cursor: not-allowed; }
  .day-num { font-size: 18px; font-weight: 700; }
  .day-dot {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .day-people-badge {
    position: absolute;
    top: 5px;
    right: 5px;
    font-size: 10px;
    font-weight: 700;
    color: #888880;
    background: #F4F3EF;
    border-radius: 4px;
    padding: 1px 4px;
  }
  .cs-badge {
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 11px;
    font-weight: 800;
    color: #E24B4A;
    background: #FFF0F0;
    border: 1px solid #E24B4A;
    border-radius: 4px;
    padding: 1px 4px;
    letter-spacing: 0.03em;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: #ffffff;
    width: 100%;
    max-width: 480px;
    border-radius: 18px 18px 0 0;
    padding: 1.25rem 1.25rem 1.75rem;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin: 0; }
  .modal-close {
    background: #F4F3EF;
    border: none;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 16px;
    color: #555;
    cursor: pointer;
  }
  .modal-field { margin-bottom: 1rem; }
  .modal-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888880;
    margin-bottom: 6px;
  }
  .modal-field input[type=text],
  .modal-field input[type=number] {
    width: 100%;
    height: 44px;
    font-size: 16px;
    padding: 0 12px;
    border: 1.5px solid #D5D3CC;
    border-radius: 9px;
    background: #FAFAF8;
  }
  .color-choices { display: flex; gap: 6px; }
  .color-swatch {
    flex: 1;
    height: 48px;
    border-radius: 9px;
    border: 2px solid transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #000;
    padding: 0;
  }
  .color-swatch.selected { border-color: #1a1a1a; }
  .color-swatch.c-vert { background: #4CAF50; }
  .color-swatch.c-jaune { background: #FFD54F; }
  .color-swatch.c-rouge { background: #E24B4A; }
  .color-swatch.c-rougeE { background: #E24B4A; }

  .summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1.25rem 0.6rem 0; }
  .metric { background: #ffffff; border: 1px solid #E4E2DC; border-radius: 12px; padding: 1rem; }
  .metric-label { font-size: 13px; color: #888880; margin: 0 0 4px; }
  .metric-value { font-size: 24px; font-weight: 600; margin: 0; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Juillet 2026</h1>
  <div class="name-row">
    <label for="user-name">Groupe</label>
    <input type="text" id="user-name" placeholder="Votre groupe">
  </div>
</div>

<div class="cal-wrap">
  <div class="cal-grid" id="cal"></div>
</div>

<div class="summary">
  <div class="metric">
    <p class="metric-label">Total personnes</p>
    <p class="metric-value" id="total-people">0</p>
  </div>
  <div class="metric">
    <p class="metric-label">Jours renseignés</p>
    <p class="metric-value" id="days-filled">0</p>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <p class="modal-title" id="modal-title">Jour</p>
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
    </div>

    <div class="modal-field">
      <label for="modal-place">Lieu</label>
      <input type="text" id="modal-place" placeholder="Lieu">
    </div>

    <div class="modal-field">
      <label for="modal-people">Nombre de personnes</label>
      <input type="number" id="modal-people" min="0" placeholder="0" inputmode="numeric">
    </div>

    <div class="modal-field">
      <label>Couleur</label>
      <div class="color-choices" id="modal-colors"></div>
    </div>
  </div>
</div>

<script>
const DAYS_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const cal = document.getElementById('cal');
const offset = 2;

const COLOR_OPTIONS = [
  { key: 'vert', label: '', cls: 'c-vert', color: '#4CAF50' },
  { key: 'jaune', label: '', cls: 'c-jaune', color: '#FFD54F' },
  { key: 'rouge', label: '', cls: 'c-rouge', color: '#E24B4A' },
  { key: 'rougeE', label: 'E', cls: 'c-rougeE', color: '#8B1E1E' }
];

const CS_DAYS = [4, 24];

function getCol(day) { return (day - 1 + offset) % 7; }

function isGreyed(day) {
  if (day === 2) return true;
  const col = getCol(day);
  if (day >= 7 && (col === 1 || col === 2)) return true;
  return false;
}

DAYS_FR.forEach(d => {
  const h = document.createElement('div');
  h.className = 'cal-header';
  h.textContent = d;
  cal.appendChild(h);
});

for (let i = 0; i < offset; i++) {
  const e = document.createElement('div');
  e.className = 'cal-day empty';
  cal.appendChild(e);
}

const STORAGE_KEY = 'calendrier-juillet-2026';
const NAME_KEY = 'calendrier-juillet-2026-name';
let state = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch (e) {}

const nameInput = document.getElementById('user-name');
try {
  const savedName = localStorage.getItem(NAME_KEY);
  if (savedName) nameInput.value = savedName;
} catch (e) {}
nameInput.addEventListener('input', () => {
  try { localStorage.setItem(NAME_KEY, nameInput.value); } catch (e) {}
});

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function updateSummary() {
  let total = 0;
  let filled = 0;
  Object.values(state).forEach(v => {
    const n = parseInt(v.people, 10);
    if (!isNaN(n) && n > 0) { total += n; filled += 1; }
  });
  document.getElementById('total-people').textContent = total;
  document.getElementById('days-filled').textContent = filled;
}

const cellRefs = {};

function renderCellVisual(day) {
  const cell = cellRefs[day];
  if (!cell) return;
  const s = state[day];

  cell.querySelectorAll('.day-dot, .day-people-badge').forEach(el => el.remove());

  if (s.colorKey) {
    const opt = COLOR_OPTIONS.find(o => o.key === s.colorKey);
    if (opt) {
      const dot = document.createElement('div');
      dot.className = 'day-dot';
      dot.style.background = opt.color;
      cell.appendChild(dot);
    }
  }

  const n = parseInt(s.people, 10);
  if (!isNaN(n) && n > 0) {
    const badge = document.createElement('div');
    badge.className = 'day-people-badge';
    badge.textContent = n;
    cell.appendChild(badge);
  }
}

for (let d = 1; d <= 31; d++) {
  if (!state[d]) state[d] = { people: '', colorKey: null, place: '' };
  const greyed = isGreyed(d);

  const cell = document.createElement('div');
  cell.className = 'cal-day' + (greyed ? ' greyed' : '');

  const num = document.createElement('div');
  num.className = 'day-num';
  num.textContent = d;
  cell.appendChild(num);

  cellRefs[d] = cell;

  if (!greyed) {
    cell.addEventListener('click', () => openModal(d));
  }

  cal.appendChild(cell);
  renderCellVisual(d);
}

const overlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalPlace = document.getElementById('modal-place');
const modalPeople = document.getElementById('modal-people');
const modalColors = document.getElementById('modal-colors');
const modalClose = document.getElementById('modal-close');

let currentDay = null;

function openModal(day) {
  currentDay = day;
  const s = state[day];
  modalTitle.textContent = day + ' juillet';
  modalPlace.value = s.place || '';
  modalPeople.value = s.people || '';

  modalColors.innerHTML = '';
  COLOR_OPTIONS.forEach(opt => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'color-swatch ' + opt.cls;
    btn.textContent = opt.label;
    if (s.colorKey === opt.key) btn.classList.add('selected');
    btn.addEventListener('click', () => {
      if (state[currentDay].colorKey === opt.key) {
        state[currentDay].colorKey = null;
      } else {
        state[currentDay].colorKey = opt.key;
      }
      save();
      renderCellVisual(currentDay);
      modalColors.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected'));
      if (state[currentDay].colorKey === opt.key) btn.classList.add('selected');
    });
    modalColors.appendChild(btn);
  });

  overlay.classList.add('open');
}

function closeModal() {
  overlay.classList.remove('open');
  currentDay = null;
}

modalPlace.addEventListener('input', () => {
  if (currentDay === null) return;
  state[currentDay].place = modalPlace.value;
  save();
});

modalPeople.addEventListener('input', () => {
  if (currentDay === null) return;
  state[currentDay].people = modalPeople.value;
  save();
  updateSummary();
  renderCellVisual(currentDay);
});

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

updateSummary();
</script>

</body>
</html>
